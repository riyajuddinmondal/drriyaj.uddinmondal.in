<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinics</title>
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <style>
        /* Define custom font from absolute URL */
        @font-face {
            font-family: 'MyCustomFont';
            src: url('/font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'MyCustomFont', sans-serif;
            height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* Remote Background Image */
            background-image: url('/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.45); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 35px;
            font-size: 36px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section {
            margin-bottom: 30px;
        }

        /* Box specifically around the Subheadings */
        h2 {
            color: #ffffff;
            font-size: 18px;
            font-weight: normal;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: inline-block;
            margin-bottom: 12px;
            width: 100%;
        }

        /* Clean text for the status */
        .status-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            letter-spacing: 1px;
            display: block;
            font-style: italic;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            font-size: 15px;
            opacity: 0.7;
            transition: 0.3s;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
        }

        .back-link:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Clinics</h1>
        
        <div class="section">
            <h2>Outdoor Consultation Locations</h2>
            <p class="status-text">Currently Not Available</p>
        </div>

        <div class="section">
            <h2>Indoor Treatment Hospitals</h2>
            <p class="status-text">Currently Not Available</p>
        </div>

        <a href="https://drriyaj.uddinmondal.in/" class="back-link">← Back to Home</a>
    </div>

</body>
</html>
